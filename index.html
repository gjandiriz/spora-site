<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>SPORA | Sistema de Trazabilidad</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #07111f; color: white; text-align: center; }
        .container { max-width: 450px; margin: auto; padding: 25px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .hidden { display: none !important; }
        
        /* Estética Spora */
        h1 { font-size: 32px; letter-spacing: 3px; color: white; margin-bottom: 5px; }
        .sub { color: #2fc95c; font-size: 14px; margin-bottom: 30px; letter-spacing: 1px; }
        
        input, select { width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; font-size: 18px; outline: none; }
        button { width: 100%; padding: 16px; margin: 15px 0; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-green { background: #2fc95c; color: #07111f; }
        .btn-gray { background: #2c3e50; color: white; }
        
        /* El Visor */
        #reader { width: 100%; border-radius: 15px; overflow: hidden; border: 2px solid #2fc95c; background: #000; margin: 20px 0; }
        #log-scan { margin-top: 20px; font-size: 14px; text-align: left; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; max-height: 120px; overflow-y: auto; }
        .status-msg { font-size: 14px; color: #f39c12; min-height: 20px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>SPORA</h1>
    <div class="sub">TRAZABILIDAD EN VIVO</div>

    <div id="p-login">
        <input type="password" id="pin" placeholder="PIN de acceso" inputmode="numeric">
        <button class="btn-green" onclick="login()">INGRESAR</button>
        <div id="msg-login" class="status-msg"></div>
    </div>

    <div id="p-puesto" class="hidden">
        <p>Hola <b id="user-name"></b>, ¿dónde estás?</p>
        <select id="sel-puesto"></select>
        <button class="btn-green" onclick="irAlEscaner()">CONFIGURAR PUESTO</button>
    </div>

    <div id="p-scan" class="hidden">
        <div style="background:rgba(47,201,92,0.1); padding:8px; border-radius:8px; margin-bottom:15px;">
            <span id="label-puesto" style="color:#2fc95c; font-weight:bold;"></span>
        </div>
        
        <div id="reader"></div>
        
        <button id="btn-cam" class="btn-gray" onclick="encenderCamara()">▶️ ACTIVAR CÁMARA</button>
        <div id="msg-scan" class="status-msg"></div>

        <div id="log-scan"></div>
        <button onclick="location.reload()" style="background:transparent; color:#666; font-size:12px; margin-top:30px; border:none;">Cerrar Sesión</button>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbzbNN-xJFtiD3rhXc0fNlVPk2slg6JPW9RhNd8VyLHxlPOaUvuc2TNwiluJX2waT_s4/exec";
    let usuario = "";
    let puesto = "";
    let scanner = null;

    function mostrar(id) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function login() {
        const pin = document.getElementById('pin').value;
        if(!pin) return;
        document.getElementById('msg-login').innerText = "Verificando...";
        
        fetch(`${API}?action=login&pin=${pin}`)
            .then(r => r.json())
            .then(res => {
                if(res.status === "OK") {
                    usuario = res.usuario.nombre;
                    document.getElementById('user-name').innerText = usuario;
                    const sel = document.getElementById('sel-puesto');
                    sel.innerHTML = '<option value="">-- Seleccionar Puesto --</option>';
                    res.puestosDisponibles.forEach(p => sel.innerHTML += `<option value="${p}">${p}</option>`);
                    mostrar('p-puesto');
                } else {
                    document.getElementById('msg-login').innerText = res.mensaje;
                }
            }).catch(() => alert("Error de conexión con el servidor"));
    }

    function irAlEscaner() {
        puesto = document.getElementById('sel-puesto').value;
        if(!puesto) return alert("Seleccioná un puesto");
        document.getElementById('label-puesto').innerText = "ESTACIÓN: " + puesto;
        mostrar('p-scan');
    }

    async function encenderCamara() {
        document.getElementById('btn-cam').classList.add('hidden');
        if(!scanner) scanner = new Html5Qrcode("reader");
        
        try {
            // Pedimos permiso explícito antes (Truco Safari)
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            stream.getTracks().forEach(t => t.stop());

            await scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 },
                (txt) => { registrar(txt); },
                () => {}
            );
        } catch(e) {
            alert("Error al iniciar cámara. Asegurate de dar permiso en Safari.");
            document.getElementById('btn-cam').classList.remove('hidden');
        }
    }

    function registrar(id) {
        if(document.getElementById('msg-scan').innerText.includes("⌛")) return; // Evitar duplicados
        
        document.getElementById('msg-scan').innerText = "⌛ Registrando: " + id;
        if(navigator.vibrate) navigator.vibrate(100);

        fetch(`${API}?action=registrar&id=${encodeURIComponent(id)}&estacion=${encodeURIComponent(puesto)}&usuario=${encodeURIComponent(usuario)}`)
            .then(r => r.json())
            .then(res => {
                const log = document.getElementById('log-scan');
                const hora = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                if(res.status === "OK") {
                    log.innerHTML = `<div style="padding:5px; border-bottom:1px solid #333;"><b style="color:#2fc95c">${hora}</b> - ${res.msj}</div>` + log.innerHTML;
                    document.getElementById('msg-scan').innerText = "✅ ¡Listo! Siguiente...";
                    setTimeout(() => { document.getElementById('msg-scan').innerText = ""; }, 2000);
                } else {
                    alert(res.msj);
                    document.getElementById('msg-scan').innerText = "❌ Error";
                }
            });
    }
</script>
</body>
</html>
