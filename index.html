<!DOCTYPE html>
<html lang="es">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Spora Systems V5.3 | Final Fix</title>
    
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #07111f; color: white; margin: 0; padding: 15px; text-align: center; }
        .card { background: #111d2b; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 500px; margin: auto; border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }
        button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; color: white; background: #2c3e50; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #2c3e50; background: #07111f; color: white; box-sizing: border-box; font-size: 16px; outline: none; }
        label { display: block; text-align: left; font-size: 11px; font-weight: bold; margin-top: 10px; color: #2fc95c; }
        .item-lista { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 12px; margin: 5px 0; border-radius: 8px; border-left: 4px solid #2fc95c; }
        .box-mapeo { background: rgba(0,0,0,0.2); border: 1px dashed #2fc95c; padding: 15px; border-radius: 8px; margin-top: 10px; text-align: left; }
        .etiqueta-preview { background: white; color: black; border: 2px solid #000; margin: 15px auto; padding: 10px; width: 280px; text-align: center; border-radius: 5px; page-break-inside: avoid; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid #3498db; background: #000; margin: 15px 0; min-height: 200px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="letter-spacing: 5px; margin-bottom: 0;">SPORA</h1>
    <p style="color: #2fc95c; font-weight: bold; font-size: 11px; margin-top: 5px; margin-bottom: 30px;">SYSTEMS V5.3</p>

    <div id="pantalla-login">
        <input type="password" id="pin-login" placeholder="PIN de Acceso" inputmode="numeric">
        <button onclick="login()" style="background:#2fc95c; color:#07111f;">ENTRAR</button>
    </div>

    <div id="pantalla-menu" class="hidden">
        <button onclick="mostrar('pantalla-proyecto')" style="background:#e67e22">🚀 NUEVO PROYECTO / LOTE</button>
        <button onclick="mostrar('pantalla-impresion')" style="background:#34495e">🏷️ CONFIGURAR ETIQUETAS</button>
        <hr style="opacity:0.1">
        <button onclick="mostrar('form-usuario')" style="background:#8e44ad">👤 NUEVA FICHA USUARIO</button>
        <button onclick="abrirGestor('USUARIO')" style="background:#9b59b6">👥 GESTIONAR USUARIOS</button>
        <button onclick="form-estacion" style="background:#2980b9">🏗️ NUEVA ESTACIÓN</button>
        <button onclick="abrirGestor('ESTACION')" style="background:#16a085">📋 GESTIONAR ESTACIONES</button>
        <button onclick="cargarFlujograma()" style="background:#f39c12">⚙️ CONFIGURAR FLUJO</button>
        <button onclick="location.reload()" style="background:#444; margin-top:20px;">SALIR</button>
    </div>

    <div id="pantalla-seleccion-puesto" class="hidden">
        <h3>Panel de Producción</h3>
        <p>Hola <strong id="nombre-op" style="color:#2fc95c;"></strong></p>
        <select id="select-puesto-op"></select>
        <button onclick="entrarAPuesto()" style="background:#f39c12">INGRESAR A ESTACIÓN</button>
    </div>

    <div id="pantalla-operario" class="hidden">
        <div style="background:#07111f; padding:10px; border-radius:10px; border:1px solid #3498db; margin-bottom:10px;">
            <p style="margin:2px"><strong id="estacion-op" style="color:#3498db;"></strong> | <span id="nombre-op-scan"></span></p>
        </div>
        <div id="reader"></div>
        <button id="btn-cam" onclick="encenderCamara()" style="background:#27ae60">▶️ ESCANEAR PIEZA</button>
        <input type="text" id="input-scan" placeholder="Esperando..." readonly style="text-align:center;">
        <div id="log-scan" style="margin-top:15px; max-height:120px; overflow-y:auto; background:rgba(0,0,0,0.3); padding:10px; border-radius:8px;"></div>
        <button onclick="location.reload()" style="background:#444; margin-top:15px;">SALIR</button>
    </div>

    <div id="pantalla-impresion" class="hidden">
        <h3>Configurador de Etiquetas</h3>
        <div style="display:flex; gap:5px;">
            <input type="text" id="id-proy-print" placeholder="ID Proyecto">
            <button onclick="cargarColumnasProyecto()" style="background:#3498db; width:auto;">🔍</button>
        </div>
        <div id="selector-campos-etiqueta" class="hidden">
            <div id="lista-checks-campos" style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; text-align: left; padding:10px; background:rgba(0,0,0,0.2); border-radius:8px; margin-top:10px;"></div>
            <button onclick="generarVistaEtiquetasFlex()" style="background:#27ae60; margin-top:10px;">GENERAR ETIQUETAS</button>
        </div>
        <div id="contenedor-etiquetas" style="margin-top:20px;"></div>
        <button onclick="window.print()" style="background:#2c3e50">🖨️ IMPRIMIR</button>
        <button onclick="mostrar('pantalla-menu')" style="background:#444">VOLVER</button>
    </div>

    <div id="pantalla-proyecto" class="hidden">
        <h3>Nuevo Lote</h3>
        <input type="text" id="p-id" placeholder="ID Proyecto">
        <input type="file" id="p-file" accept=".xlsx, .xls, .csv" onchange="leerExcel(this)">
        <div id="zona-mapeo" class="hidden">
            <div class="box-mapeo">
                <label>OC:</label><select id="map-oc"></select>
                <label>ID Pieza:</label><select id="map-pieza"></select>
                <div id="contenedor-extras"></div>
                <button onclick="agregarFilaExtra()" style="background:#3498db; font-size:11px; padding:5px; width:auto;">+ Extra</button>
            </div>
            <button onclick="confirmarImportacion()" style="background:#27ae60; margin-top:10px;">IMPORTAR</button>
        </div>
        <button onclick="mostrar('pantalla-menu')" style="background:#444">VOLVER</button>
    </div>

    <div id="form-usuario" class="hidden">
        <h3>Ficha Persona</h3>
        <input type="text" id="u-nombre" placeholder="Nombre"><input type="number" id="u-pin" placeholder="PIN">
        <select id="u-rol"><option value="OPERARIO">OPERARIO</option><option value="GERENTE">GERENTE</option></select>
        <button onclick="guardarUsuario()" style="background:#27ae60">GUARDAR</button><button onclick="mostrar('pantalla-menu')" style="background:#444">VOLVER</button>
    </div>
    <div id="pantalla-gestor" class="hidden"><h3 id="titulo-gestor"></h3><div id="lista-gestor"></div><button onclick="mostrar('pantalla-menu')" style="background:#444">VOLVER</button></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzbNN-xJFtiD3rhXc0fNlVPk2slg6JPW9RhNd8VyLHxlPOaUvuc2TNwiluJX2waT_s4/exec";
    let usuarioActual = "", estacionActual = "", html5QrCode = null, isProcessing = false;
    let datosExcelRaw = [], listaColumnasExcel = [];

    function callServer(action, params, callback) {
        if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run.withSuccessHandler(callback)[action](...Object.values(params));
        } else {
            let url = API_URL + "?action=" + action;
            for (let key in params) { url += "&" + key + "=" + encodeURIComponent(params[key]); }
            fetch(url).then(r => r.json()).then(callback).catch(e => {
                console.error("Falla en API:", e);
                alert("Error de conexión API. Verifica la consola.");
            });
        }
    }

    function mostrar(id) {
        document.querySelectorAll('.card > div').forEach(d => d.classList.add('hidden'));
        if(document.getElementById(id)) document.getElementById(id).classList.remove('hidden');
    }

    function login() {
        const pin = document.getElementById('pin-login').value;
        callServer("login", {pin: pin}, res => {
            if (res.status === "OK") {
                usuarioActual = res.usuario.nombre;
                if (res.usuario.rol === "GERENTE") mostrar('pantalla-menu');
                else {
                    document.getElementById('nombre-op').innerText = usuarioActual;
                    const sel = document.getElementById('select-puesto-op');
                    sel.innerHTML = '<option value="">-- Puesto --</option>';
                    res.puestosDisponibles.forEach(p => sel.innerHTML += `<option value="${p}">${p}</option>`);
                    mostrar('pantalla-seleccion-puesto');
                }
            } else alert(res.mensaje);
        });
    }

    function entrarAPuesto() {
        estacionActual = document.getElementById('select-puesto-op').value;
        if (!estacionActual) return alert("Seleccioná un puesto");
        document.getElementById('estacion-op').innerText = estacionActual;
        mostrar('pantalla-operario');
    }

    function encenderCamara() {
        if (isProcessing) return;
        document.getElementById("reader").style.display = "block";
        if(!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: 250 },
            (txt) => { 
                isProcessing = true;
                html5QrCode.stop().then(() => { 
                    document.getElementById("reader").style.display = "none";
                    procesarScan(txt);
                });
            }, 
            () => {}
        );
    }

    function procesarScan(id) {
        const input = document.getElementById('input-scan');
        input.value = "⌛ REGISTRANDO..."; input.style.background = "#f1c40f"; 
        callServer("registrar", {id: id, estacion: estacionActual, usuario: usuarioActual}, res => {
            input.style.background = "#2fc95c"; input.value = "✅ CAPTURADO: " + id;
            document.getElementById('log-scan').innerHTML = `<div><b>${new Date().toLocaleTimeString()}</b>: ${res.msj}</div>` + document.getElementById('log-scan').innerHTML;
            setTimeout(() => { input.value = ""; input.style.background = "#fff"; isProcessing = false; }, 1500);
        });
    }

    function cargarColumnasProyecto() {
        const id = document.getElementById('id-proy-print').value;
        if(!id) return alert("Ingresá un ID de Proyecto");
        
        callServer("listaGestion", {tipo: "PIEZAS_PROYECTO", id: id}, res => {
            if (!res || !res.encabezados) return alert("No se encontraron datos.");
            
            const lista = document.getElementById('lista-checks-campos');
            lista.innerHTML = "";
            
            // Recorremos los encabezados reales que vienen del Sheet
            res.encabezados.forEach((h, i) => { 
                // Saltamos las columnas técnicas (Proyecto, Estado, Fecha) para no marear al usuario
                if(i !== 0 && i !== 3 && i !== 4 && i !== 5) { 
                    lista.innerHTML += `
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:5px; background:rgba(255,255,255,0.05); padding:5px; border-radius:5px;">
                            <input type="checkbox" class="check-col-print" value="${i}"> 
                            <span style="flex-grow:1; font-size:13px;">${h}</span>
                            <label style="font-size:9px; margin:0; color:#aaa;">
                                <input type="checkbox" class="check-con-titulo" data-col="${i}"> Título
                            </label>
                        </div>`; 
                }
            });
            document.getElementById('selector-campos-etiqueta').classList.remove('hidden');
        });
    }
    // --- FUNCIÓN REEMPLAZADA PARA ETIQUETAS Y CÓDIGO DE BARRAS ---
    function generarVistaEtiquetasFlex() {
        const id = document.getElementById('id-proy-print').value;
        
        // 1. Obtenemos qué columnas quiere imprimir
        const checksDato = Array.from(document.querySelectorAll('.check-col-print:checked'));
        
        callServer("listaGestion", {tipo: "PIEZAS_PROYECTO", id: id}, res => {
            if (!res || !res.piezas) return alert("Error.");
            const cont = document.getElementById('contenedor-etiquetas'); cont.innerHTML = "";
            
            res.piezas.forEach((p, i) => {
                let cuerpoEtiqueta = "";
                const idEtiquetaUnico = p[2]; // El ID único siempre es la Columna C (índice 2)

                // 2. Construimos el contenido basado en los checks
                checksDato.forEach(cb => {
                    const colIndex = parseInt(cb.value);
                    const nombreColumna = res.encabezados[colIndex];
                    const valorDato = p[colIndex] || "";
                    
                    // Verificamos si marcó "Incluir Título" para esta columna específica
                    const conTitulo = document.querySelector(`.check-con-titulo[data-col="${colIndex}"]`).checked;
                    
                    if (conTitulo) {
                        cuerpoEtiqueta += `<div style="font-size:12px;">${nombreColumna}: <b>${valorDato}</b></div>`;
                    } else {
                        cuerpoEtiqueta += `<div style="font-size:14px; font-weight:bold;">${valorDato}</div>`;
                    }
                });

                const div = document.createElement('div'); 
                div.className = "etiqueta-preview";
                div.innerHTML = `
                    <div style="font-size:10px; border-bottom:1px solid #eee; margin-bottom:5px;">PROY: ${id}</div>
                    ${cuerpoEtiqueta}
                    <svg id="barcode-et-${i}"></svg>
                `;
                cont.appendChild(div);

                // Generamos el código de barras con el ID ÚNICO
                JsBarcode(`#barcode-et-${i}`, idEtiquetaUnico, {
                    format: "CODE128", height: 40, displayValue: true, fontSize: 10
                });
            });
        });
    }

    function leerExcel(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            datosExcelRaw = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            if(datosExcelRaw.length > 0) {
                listaColumnasExcel = Object.keys(datosExcelRaw[0]);
                llenarSelect('map-oc', listaColumnasExcel); llenarSelect('map-pieza', listaColumnasExcel);
                document.getElementById('zona-mapeo').classList.remove('hidden');
            }
        };
        reader.readAsArrayBuffer(input.files[0]);
    }

    function llenarSelect(id, cols) {
        const sel = document.getElementById(id); sel.innerHTML = '<option value="">--</option>';
        cols.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
    }

    function confirmarImportacion() {
        const idProy = document.getElementById('p-id').value.trim();
        const ocCol = document.getElementById('map-oc').value;
        const pzCol = document.getElementById('map-pieza').value;
        
        // Obtenemos los nombres de las columnas extras mapeadas
        const extras = Array.from(document.querySelectorAll('.select-extra')).map(s => s.value);
        
        // Creamos los encabezados para la Fila 1 del Sheet
        const encabezadosParaSheet = ["PROYECTO_ID", "ORDEN_COMPRA", "ID_SPORA", "ESTADO", "FECHA", pzCol, ...extras];

        // Mapeamos las filas de datos
        const filas = datosExcelRaw.map(r => {
            const fila = [r[ocCol] || "S/D", r[pzCol] || "S/D"];
            extras.forEach(ex => fila.push(r[ex] || ""));
            return fila;
        });

        callServer("crearProyecto", {id: idProy}, resP => {
            if(resP.status === "OK") {
                // Enviamos todo: ID, Datos y Encabezados
                callServer("importarDatosMapeados", {id: idProy, f: JSON.stringify(filas), h: JSON.stringify(encabezadosParaSheet)}, resI => { 
                    alert("Importación Exitosa"); 
                    mostrar('pantalla-menu'); 
                });
            } else alert(resP.msj);
        });
    }

    function abrirGestor(t) {
        mostrar('pantalla-gestor');
        callServer("listaGestion", {tipo: t}, res => {
            const c = document.getElementById('lista-gestor'); c.innerHTML = "";
            if(res && res.forEach) res.forEach(i => { c.innerHTML += `<div class="item-lista"><span>${i.nombre}</span></div>`; });
        });
    }
</script>
</body>
</html>
