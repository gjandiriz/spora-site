<!DOCTYPE html>
<html lang="es">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Spora Systems V5.4 | Power Fix</title>
    
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #07111f; color: white; margin: 0; padding: 15px; text-align: center; }
        .card { background: #111d2b; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 500px; margin: auto; border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }
        button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; color: white; background: #2c3e50; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #2c3e50; background: #07111f; color: white; box-sizing: border-box; font-size: 16px; outline: none; }
        label { display: block; text-align: left; font-size: 11px; font-weight: bold; margin-top: 10px; color: #2fc95c; }
        .item-lista { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 12px; margin: 5px 0; border-radius: 8px; border-left: 4px solid #2fc95c; }
        .box-mapeo { background: rgba(0,0,0,0.2); border: 1px dashed #2fc95c; padding: 15px; border-radius: 8px; margin-top: 10px; text-align: left; }
        .etiqueta-preview { background: white; color: black; border: 2px solid #000; margin: 15px auto; padding: 10px; width: 280px; text-align: center; border-radius: 5px; page-break-inside: avoid; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid #3498db; background: #000; margin: 15px 0; min-height: 200px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="letter-spacing: 5px; margin-bottom: 0;">SPORA</h1>
    <p style="color: #2fc95c; font-weight: bold; font-size: 11px; margin-top: 5px; margin-bottom: 30px;">SYSTEMS V5.4</p>

    <div id="pantalla-login">
        <input type="password" id="pin-login" placeholder="PIN de Acceso" inputmode="numeric">
        <button onclick="login()" style="background:#2fc95c; color:#07111f;">ENTRAR</button>
    </div>

    <div id="pantalla-menu" class="hidden">
    <button onclick="mostrar('pantalla-proyecto')" style="background:#e67e22">🚀 NUEVO PROYECTO / LOTE</button>
    <button onclick="mostrar('pantalla-impresion')" style="background:#34495e">🏷️ CONFIGURAR ETIQUETAS</button>
    <button onclick="abrirBuscadorReimpresion()" style="background:#3498db">🔍 BUSCADOR / REIMPRESIÓN</button>
    
    <button onclick="abrirConfigEmpresa()" style="background:#16a085">⚙️ CONFIGURACIÓN DE PLANTA</button>
    
    <hr style="opacity:0.1">
    <button onclick="cargarFlujograma()" style="background:#f39c12">⚙️ GESTIONAR ESTACIONES Y FLUJO</button>
    <hr style="opacity:0.1">
    <button onclick="mostrar('form-usuario')" style="background:#8e44ad">👤 NUEVA FICHA USUARIO</button>
    <button onclick="abrirGestorUsuarios()" style="background:#9b59b6">👥 GESTIONAR USUARIOS</button>
    <button onclick="mostrar('form-estacion')" style="background:#2980b9">🏗️ NUEVA ESTACIÓN</button>
    <button onclick="location.reload()" style="background:#444; margin-top:20px;">SALIR</button>
</div>

    <div id="pantalla-impresion" class="hidden">
        <h3>Etiquetas y Diseño</h3>
        <label>1. Buscar Proyecto para diseñar:</label>
        <div style="display:flex; gap:5px;">
            <input type="text" id="id-proy-print" placeholder="ID Proyecto">
            <button onclick="cargarConfigurador()" style="background:#3498db; width:auto;">BUSCAR</button>
        </div>
        
        <div id="config-campos-etiqueta" style="margin-top:15px; background:rgba(255,255,255,0.05); padding:10px; border-radius:10px;"></div>

        <div id="preview-maestra-container" style="margin: 20px 0; padding: 10px; border: 1px dashed #2fc95c; background: rgba(47, 201, 92, 0.05); border-radius: 10px;">
            <p style="font-size: 10px; color: #2fc95c; margin-top: 0;">👁️ VISTA PREVIA EN VIVO</p>
            <div id="etiqueta-preview-live" class="etiqueta-preview" style="margin: 0 auto;"></div>
        </div>

        <button onclick="guardarDisenoMaestro()" style="background:#8e44ad;">💾 GUARDAR DISEÑO MAESTRO</button>
        <hr style="opacity:0.1">
        <button onclick="imprimirLoteCompleto(document.getElementById('id-proy-print').value)" style="background:#27ae60;">🖨️ GENERAR LOTE COMPLETO</button>
        
        <div id="contenedor-etiquetas" style="margin-top:20px;"></div>
        
        <button onclick="window.print()" style="background:#2c3e50" id="btn-imprimir-ahora" class="hidden">IMPRIMIR AHORA</button>
        <button onclick="mostrar('pantalla-menu')" style="background:#444">VOLVER</button>
    </div>

    <div id="pantalla-reimpresion" class="hidden">
        <h3>Buscador de Piezas</h3>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <input type="text" id="input-busqueda-universal" placeholder="Cliente, OC o ID...">
            <button onclick="ejecutarBusquedaUniversal()" style="width:50px; margin:0;">🔍</button>
        </div>
        <div id="lista-resultados-busqueda" style="max-height:350px; overflow-y:auto;"></div>
        <button onclick="mostrar('pantalla-menu')" style="background:#444; margin-top:15px;">VOLVER</button>
    </div>

    <div id="pantalla-proyecto" class="hidden">
        <h3>Nuevo Lote</h3>
        <input type="text" id="p-id" placeholder="ID Proyecto">
        <input type="file" id="p-file" accept=".xlsx, .xls, .csv" onchange="leerExcel(this)">
        <div id="zona-mapeo" class="hidden">
            <div class="box-mapeo">
                <label>OC:</label><select id="map-oc"></select>
                <label>ID Pieza:</label><select id="map-pieza"></select>
                <div id="contenedor-extras"></div>
                <button onclick="agregarFilaExtra()" style="background:#3498db; font-size:11px; padding:5px; width:auto;">+ Extra</button>
            </div>
            <button onclick="confirmarImportacion()" style="background:#27ae60; margin-top:10px;">IMPORTAR</button>
        </div>
        <button onclick="mostrar('pantalla-menu')" style="background:#444">VOLVER</button>
    </div>

    <div id="pantalla-seleccion-puesto" class="hidden">
        <h3>Panel de Producción</h3>
        <p>Hola <strong id="nombre-op" style="color:#2fc95c;"></strong></p>
        <select id="select-puesto-op"></select>
        <button onclick="entrarAPuesto()" style="background:#f39c12">INGRESAR A ESTACIÓN</button>
    </div>

    <div id="pantalla-operario" class="hidden">
        <div style="background:#07111f; padding:10px; border-radius:10px; border:1px solid #3498db; margin-bottom:10px;">
            <p style="margin:2px"><strong id="estacion-op" style="color:#3498db;"></strong> | <span id="nombre-op-scan"></span></p>
        </div>
        <div id="reader"></div>
        <button id="btn-cam" onclick="encenderCamara()" style="background:#27ae60">▶️ ESCANEAR PIEZA</button>
        <input type="text" id="input-scan" placeholder="Esperando..." readonly style="text-align:center;">
        <div id="log-scan" style="margin-top:15px; max-height:120px; overflow-y:auto; background:rgba(0,0,0,0.3); padding:10px; border-radius:8px;"></div>
        <button onclick="location.reload()" style="background:#444; margin-top:15px;">SALIR</button>
    </div>

    <div id="form-usuario" class="hidden">
        <h3>Ficha de Personal</h3>
        <div style="text-align:left;">
            <label>Nro. de Legajo:</label><input type="text" id="u-legajo">
            <label>Nombre:</label><input type="text" id="u-nombre">
            <label>PIN (4 dígitos):</label><input type="number" id="u-pin">
            <label>Rol:</label><select id="u-rol"><option value="OPERARIO">OPERARIO</option><option value="GERENTE">GERENTE</option></select>
        </div>
        <button onclick="guardarUsuario()" style="background:#27ae60; margin-top:20px;">CREAR USUARIO</button>
        <button onclick="mostrar('pantalla-menu')" style="background:#444">CANCELAR</button>
    </div>

    <div id="form-estacion" class="hidden">
        <h3>Nueva Estación</h3>
        <input type="text" id="est-nombre" placeholder="Nombre Estación">
        <input type="text" id="est-desc" placeholder="Descripción">
        <button onclick="guardarEstacion()" style="background:#27ae60">GUARDAR</button>
        <button onclick="mostrar('pantalla-menu')" style="background:#444">VOLVER</button>
    </div>

    <div id="pantalla-flujo" class="hidden">
        <h3>Configurador de Flujo</h3>
        <div id="lista-flujo-estaciones"></div>
        <button onclick="salvarFlujo()" style="background:#2fc95c; margin-top:20px;">GUARDAR ORDEN</button>
        <button onclick="mostrar('pantalla-menu')" style="background:#444">VOLVER</button>
    </div>

    <div id="pantalla-gestor" class="hidden"><h3 id="titulo-gestor"></h3><div id="lista-gestor"></div><button onclick="mostrar('pantalla-menu')" style="background:#444">VOLVER</button></div>
</div>

<div id="modal-reimpresion" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column;">
    <div id="area-ticket-reimpresion" style="background:white; padding:20px; border-radius:10px;">
        </div>
    <div style="margin-top:20px; display:flex; gap:10px;">
        <button onclick="lanzarImpresionUnica()" style="background:#2fc95c; width:150px;">Confirmar e Imprimir</button>
        <button onclick="document.getElementById('modal-reimpresion').classList.add('hidden')" style="background:#e74c3c; width:150px;">Cancelar</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzSMWJgJfe7BETkD6dYtMo0qTfShM3LJHBNtb-Yuv5VdXAPYADhc_OBjXqmgBr5fttW/exec";
    let usuarioActual = "", estacionActual = "", html5QrCode = null, isProcessing = false;
    let datosExcelRaw = [], listaColumnasExcel = [], estacionesParaFlujo = [];
    let piezaDeMuestra = null;

    function callServer(action, params, callback) {
        params.action = action;
        const formData = new FormData();
        for (const key in params) { formData.append(key, params[key]); }
        fetch(API_URL, { method: 'POST', body: formData })
            .then(r => r.json())
            .then(callback)
            .catch(e => { console.error("Error API:", e); alert("Falla de conexión."); });
    }

    function mostrar(id) {
        document.querySelectorAll('.card > div').forEach(d => d.classList.add('hidden'));
        const el = document.getElementById(id); if(el) el.classList.remove('hidden');
    }

    function login() {
        const pin = document.getElementById('pin-login').value;
        callServer("login", {pin: pin}, res => {
            if (res.status === "OK") {
                usuarioActual = res.usuario.nombre;
                if (res.usuario.rol === "GERENTE") mostrar('pantalla-menu');
                else {
                    document.getElementById('nombre-op').innerText = usuarioActual;
                    const sel = document.getElementById('select-puesto-op');
                    sel.innerHTML = '<option value="">-- Puesto --</option>';
                    res.puestosDisponibles.forEach(p => sel.innerHTML += `<option value="${p}">${p}</option>`);
                    mostrar('pantalla-seleccion-puesto');
                }
            } else alert(res.mensaje);
        });
    }

    function entrarAPuesto() {
        estacionActual = document.getElementById('select-puesto-op').value;
        if (!estacionActual) return alert("Seleccioná un puesto");
        document.getElementById('estacion-op').innerText = estacionActual;
        mostrar('pantalla-operario');
    }
// --- MOTOR DEL ESCÁNER ---
    function encenderCamara() {
        if (isProcessing) return;
        
        const readerDiv = document.getElementById("reader");
        readerDiv.style.display = "block"; 
        
        if(html5QrCode) {
            html5QrCode.clear();
        }
        
        html5QrCode = new Html5Qrcode("reader");
        
        const config = { 
            fps: 15, // Un poquito más rápido para que no sea lento
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0 
        };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (txt) => {
                isProcessing = true;
                // Detenemos cámara para ahorrar batería y procesar
                html5QrCode.stop().then(() => {
                    readerDiv.style.display = "none";
                    procesarScan(txt);
                }).catch(err => console.error("Error al detener:", err));
            },
            (errorMessage) => { /* Silencio para no saturar la consola */ }
        ).catch(err => {
            console.error("Error cámara:", err);
            alert("No se pudo iniciar la cámara. Verificá los permisos del navegador.");
        });
    }

    function procesarScan(id) {
        const input = document.getElementById('input-scan');
        const log = document.getElementById('log-scan');
        
        input.value = "⌛ REGISTRANDO..."; 
        input.style.background = "#f1c40f"; 
        input.style.color = "#000";

        // Llamamos a tu nueva función registrarEscaneo (la que ya tiene el Historial)
        callServer("registrar", {id: id, estacion: estacionActual, usuario: usuarioActual}, res => {
            if(res.status === "OK") {
                input.style.background = "#2fc95c";
                input.style.color = "#07111f";
                input.value = "✅ " + id;
            } else {
                input.style.background = "#e74c3c";
                input.style.color = "#fff";
                input.value = "❌ ERROR";
            }
            
            // Agregamos al log visual del operario
            const hora = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            log.innerHTML = `<div style="border-bottom:1px solid rgba(255,255,255,0.1); padding:5px; font-size:12px;">
                <b>${hora}</b> - ${id}: ${res.msj}
            </div>` + log.innerHTML;

            // Limpiamos el mensaje después de 2 segundos para el próximo scan
            setTimeout(() => { 
                input.value = "LISTO PARA ESCANEAR"; 
                input.style.background = "#07111f"; 
                input.style.color = "white";
                isProcessing = false; 
            }, 2000);
        });
    }
    
    // --- CONFIGURADOR DE ETIQUETAS ---
    function cargarConfigurador() {
        const idProy = document.getElementById('id-proy-print').value;
        if (!idProy) return alert("Ingresa un ID de Proyecto");
        const cont = document.getElementById('config-campos-etiqueta');
        cont.innerHTML = "⌛ Cargando columnas...";

        callServer("listaGestion", { tipo: "PIEZAS_PROYECTO", id: idProy }, res => {
            if (res.status === "ERROR") return alert(res.msj);
            window.headersActuales = res.encabezados;
            piezaDeMuestra = res.piezas[0]; // Tomamos la primera pieza como ejemplo
            
            cont.innerHTML = `
                <div id="filas-configuracion"></div>
                <button onclick="agregarFilaConfig()" style="background:#34495e; font-size:11px; width:auto;">+ Agregar Campo</button>
            `;
            agregarFilaConfig();
        });
    }

    function agregarFilaConfig() {
        const contenedor = document.getElementById('filas-configuracion');
        const div = document.createElement('div');
        div.className = "fila-etiqueta";
        div.style = "display:flex; gap:5px; margin-bottom:5px;";
        
        let opciones = window.headersActuales.map((h, i) => `<option value="${i}">${h}</option>`).join('');
        
        div.innerHTML = `
            <select class="sel-col-et" style="flex:2" onchange="actualizarPreviewLive()">${opciones}</select>
            <select class="sel-tit-et" style="flex:1" onchange="actualizarPreviewLive()">
                <option value="NO">SIN TÍTULO</option>
                <option value="SI">CON TÍTULO</option>
            </select>
            <button onclick="this.parentElement.remove(); actualizarPreviewLive();" style="background:#c0392b; width:40px; margin:0;">X</button>
        `;
        contenedor.appendChild(div);
        actualizarPreviewLive(); // Dibujamos la primera vez
    }

    function actualizarPreviewLive() {
        if(!piezaDeMuestra) return;
        
        const cont = document.getElementById('etiqueta-preview-live');
        const filasConfig = Array.from(document.querySelectorAll('.fila-etiqueta'));
        cont.innerHTML = "";
        
        let htmlCampos = "";
        filasConfig.forEach(fila => {
            const idx = fila.querySelector('.sel-col-et').value;
            const conTitulo = fila.querySelector('.sel-tit-et').value === "SI";
            const nombreCol = window.headersActuales[idx];
            const valor = piezaDeMuestra[idx];
            htmlCampos += `<div>${conTitulo ? nombreCol + ': ' : ''}<b>${valor}</b></div>`;
        });

        cont.innerHTML = `${htmlCampos}<svg id="bar-preview-live"></svg>`;
        
        // Generamos el código de barras de muestra (usando el ID de la pieza de muestra)
        JsBarcode("#bar-preview-live", piezaDeMuestra[2], {
            format: "CODE128", 
            height: 30, 
            displayValue: true, 
            fontSize: 10
        });
    }

    function guardarDisenoMaestro() {
        const filasConfig = Array.from(document.querySelectorAll('.fila-etiqueta'));
        if(filasConfig.length === 0) return alert("Agregá al menos un campo.");
        const config = filasConfig.map(fila => ({
            colIndex: fila.querySelector('.sel-col-et').value,
            conTitulo: fila.querySelector('.sel-tit-et').value === "SI"
        }));
        callServer("guardarConfiguracionMaestra", { config: JSON.stringify(config) }, res => alert(res.msj));
    }

    // --- BUSCADOR Y REIMPRESION ---
    function abrirBuscadorReimpresion() {
        mostrar('pantalla-reimpresion');
        document.getElementById('lista-resultados-busqueda').innerHTML = "";
        document.getElementById('input-busqueda-universal').value = "";
    }

    function ejecutarBusquedaUniversal() {
        const q = document.getElementById('input-busqueda-universal').value;
        if(q.length < 2) return alert("Escribí algo más...");
        const cont = document.getElementById('lista-resultados-busqueda');
        cont.innerHTML = "⌛ Buscando...";
        callServer("buscarPiezasUniversal", { query: q }, res => {
            cont.innerHTML = "";
            if(res.piezas.length === 0) return cont.innerHTML = "❌ No se encontró nada.";
            res.piezas.forEach(p => {
                cont.innerHTML += `
                    <div class="item-lista" style="flex-direction:column; align-items:flex-start;">
                        <div style="width:100%; display:flex; justify-content:space-between;"><b>${p[1]} | ${p[2]}</b><small>${p[3]}</small></div>
                        <div style="font-size:10px; color:#aaa;">OC: ${p[1]} | Proyecto: ${p[0]}</div>
                        <button onclick="reimprimirEtiquetaUnica('${p[0]}', '${p[2]}')" style="background:#27ae60; padding:5px; margin-top:5px; font-size:10px; width:auto;">🖨️ REIMPRIMIR</button>
                    </div>`;
            });
        });
    }

    function reimprimirEtiquetaUnica(idProy, idPieza) {
        callServer("obtenerConfiguracionMaestra", {}, configJSON => {
            if(!configJSON) return alert("⚠️ No hay plantilla maestra guardada. Configurá una en el menú de etiquetas.");
            
            const config = JSON.parse(configJSON);

            callServer("listaGestion", {tipo: "PIEZAS_PROYECTO", id: idProy}, res => {
                const pieza = res.piezas.find(p => String(p[2]) === String(idPieza));
                if(!pieza) return alert("No se encontró la pieza.");

                // Mostramos el modal
                const modal = document.getElementById('modal-reimpresion');
                const cont = document.getElementById('area-ticket-reimpresion');
                modal.classList.remove('hidden');
                cont.innerHTML = "";

                let htmlCampos = "";
                config.forEach(item => {
                    const nombreCol = res.encabezados[item.colIndex];
                    const valor = pieza[item.colIndex];
                    htmlCampos += `<div style="color:black; font-family:Arial; font-size:14px; margin-bottom:2px;">${item.conTitulo ? nombreCol + ': ' : ''}<b>${valor}</b></div>`;
                });

                const div = document.createElement('div');
                div.style = "background:white; padding:10px; border:1px solid #000; width:280px; text-align:center;";
                div.innerHTML = `${htmlCampos}<svg id="bar-modal-reimp"></svg>`;
                cont.appendChild(div);

                // Código de barras
                JsBarcode("#bar-modal-reimp", idPieza, {format: "CODE128", height: 40, displayValue: true});
            });
        });
    }

    function lanzarImpresionUnica() {
        // Obtenemos la etiqueta
        const ticket = document.getElementById('area-ticket-reimpresion').innerHTML;
        
        // Abrimos una ventana nueva solo con la etiqueta para imprimir
        const ventanaPrent = window.open('', '_blank');
        ventanaPrent.document.write('<html><head><title>Imprimir Etiqueta</title>');
        ventanaPrent.document.write('<style>body{margin:0; display:flex; justify-content:center;} @page{size: auto; margin: 0mm;}</style>');
        ventanaPrent.document.write('</head><body onload="window.print(); window.close();">');
        ventanaPrent.document.write(ticket);
        ventanaPrent.document.write('</body></html>');
        ventanaPrent.document.close();
        
        // Cerramos el modal
        document.getElementById('modal-reimpresion').classList.add('hidden');
    }

    function imprimirLoteCompleto(idProy) {
        if(!idProy) return alert("ID Proyecto vacío.");
        callServer("obtenerConfiguracionMaestra", {}, configJSON => {
            if(!configJSON) return alert("❌ Primero debés guardar una Plantilla Maestra.");
            const config = JSON.parse(configJSON);
            callServer("listaGestion", {tipo: "PIEZAS_PROYECTO", id: idProy}, res => {
                const cont = document.getElementById('contenedor-etiquetas');
                cont.innerHTML = "";
                res.piezas.forEach((p, i) => {
                    let htmlCampos = "";
                    config.forEach(item => {
                        const valor = p[item.colIndex];
                        const nombreCol = res.encabezados[item.colIndex];
                        htmlCampos += `<div>${item.conTitulo ? nombreCol + ': ' : ''}<b>${valor}</b></div>`;
                    });
                    const div = document.createElement('div');
                    div.className = "etiqueta-preview";
                    div.innerHTML = `${htmlCampos}<svg id="bar-gen-${i}"></svg>`;
                    cont.appendChild(div);
                    JsBarcode(`#bar-gen-${i}`, p[2], {format: "CODE128", height: 40, displayValue: true, fontSize: 10});
                });
                document.getElementById('btn-imprimir-ahora').classList.remove('hidden');
            });
        });
    }

    // --- IMPORTACION Y OTROS ---
    function leerExcel(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            datosExcelRaw = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            if(datosExcelRaw.length > 0) {
                listaColumnasExcel = Object.keys(datosExcelRaw[0]);
                llenarSelect('map-oc', listaColumnasExcel); llenarSelect('map-pieza', listaColumnasExcel);
                document.getElementById('zona-mapeo').classList.remove('hidden');
            }
        };
        reader.readAsArrayBuffer(input.files[0]);
    }

    function confirmarImportacion() {
        const idProy = document.getElementById('p-id').value.trim();
        const oc = document.getElementById('map-oc').value;
        const pz = document.getElementById('map-pieza').value;
        if(!idProy || !oc || !pz) return alert("Completa OC y Pieza");
        const extras = Array.from(document.querySelectorAll('.select-extra')).map(s => s.value).filter(v => v !== "");
        const headersParaSheet = ["ID_PROYECTO", "OC", "CODIGO_ESCANEO", "ESTADO", "FECHA", pz, ...extras];
        const filas = datosExcelRaw.map(r => {
            const f = [String(r[oc]||""), String(r[pz]||"")];
            extras.forEach(ex => f.push(String(r[ex]||"")));
            return f;
        });
        callServer("crearProyecto", {id: idProy}, () => {
            callServer("importarDatosMapeados", {id: idProy, f: JSON.stringify(filas), h: JSON.stringify(headersParaSheet)}, res => {
                alert(res.msj); if(res.status === "OK") mostrar('pantalla-menu');
            });
        });
    }

    function llenarSelect(id, cols) {
        const sel = document.getElementById(id); sel.innerHTML = '<option value="">--</option>';
        cols.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
    }

    function agregarFilaExtra() {
        const cont = document.getElementById('contenedor-extras');
        const div = document.createElement('div'); div.style = "display:flex; gap:5px; margin-top:5px;";
        let ops = '<option value="">-- Extra --</option>';
        listaColumnasExcel.forEach(c => ops += `<option value="${c}">${c}</option>`);
        div.innerHTML = `<select class="select-extra">${ops}</select><button onclick="this.parentElement.remove()" style="background:#e74c3c; width:40px; margin:0;">X</button>`;
        cont.appendChild(div);
    }

    function guardarUsuario() {
        const d = { legajo: document.getElementById('u-legajo').value, nombre: document.getElementById('u-nombre').value, pin: document.getElementById('u-pin').value, rol: document.getElementById('u-rol').value };
        callServer("crearNuevoUsuario", d, res => { alert(res.msj); if(res.status==="OK") mostrar('pantalla-menu'); });
    }

    function guardarEstacion() {
        callServer("crearEstacion", { nombre: document.getElementById('est-nombre').value, desc: document.getElementById('est-desc').value }, res => { alert(res); mostrar('pantalla-menu'); });
    }

    function cargarFlujograma() {
        callServer("obtenerEstacionesFlujo", {}, res => { estacionesParaFlujo = res; renderizarFlujo(); mostrar('pantalla-flujo'); });
    }

    function renderizarFlujo() {
        const cont = document.getElementById('lista-flujo-estaciones'); cont.innerHTML = "";
        estacionesParaFlujo.forEach((est, i) => {
            const activa = est.estado === "ACTIVO";
            cont.innerHTML += `<div class="item-lista" style="border-left: 5px solid ${activa ? '#2fc95c' : '#e74c3c'};">
                <div style="text-align:left;"><b>${est.nombre}</b><br><small>Orden: ${est.orden}</small></div>
                <div style="display:flex; gap:5px;"><input type="number" value="${est.orden}" onchange="estacionesParaFlujo[${i}].orden=this.value" style="width:50px; margin:0;"><button onclick="estacionesParaFlujo[${i}].estado=(activa?'INACTIVO':'ACTIVO');renderizarFlujo();" style="width:50px; background:${activa?'#27ae60':'#c0392b'};">${activa?'ON':'OFF'}</button></div>
            </div>`;
        });
    }

    function salvarFlujo() {
        callServer("guardarConfiguracionFlujo", { config: JSON.stringify(estacionesParaFlujo) }, res => { alert(res.msj); if(res.status==="OK") mostrar('pantalla-menu'); });
    }

    function abrirGestorUsuarios() {
        mostrar('pantalla-gestor');
        callServer("obtenerListaUsuariosDetalle", {}, res => {
            const cont = document.getElementById('lista-gestor'); cont.innerHTML = "";
            res.forEach(u => {
                cont.innerHTML += `<div class="item-lista" style="border-left-color: ${u.estado==='ACTIVO'?'#2fc95c':'#e74c3c'}">
                    <div style="text-align:left;"><b>${u.nombre}</b><br><small>Legajo: ${u.legajo}</small></div>
                    <button onclick="borrarUsuarioDefinitivo('${u.legajo}')" style="width:auto; padding:5px; background:#c0392b; font-size:10px;">ELIMINAR</button>
                </div>`;
            });
        });
    }

    function borrarUsuarioDefinitivo(legajo) {
        if(confirm("¿Borrar?")) callServer("eliminarUsuario", {legajo: legajo}, res => { alert(res.msj); abrirGestorUsuarios(); });
    }
    function abrirConfigEmpresa() {
    const dias = ["LUN", "MAR", "MIE", "JUE", "VIE", "SAB", "DOM"];
    const cont = document.getElementById('contenedor-horarios');
    cont.innerHTML = "";
    
    dias.forEach(d => {
        cont.innerHTML += `
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:5px;">
                <span style="width:40px; font-weight:bold;">${d}</span>
                <input type="time" id="h-${d}-INI" style="margin:0; padding:5px;">
                <span>a</span>
                <input type="time" id="h-${d}-FIN" style="margin:0; padding:5px;">
            </div>`;
    });

    callServer("obtenerDatosEmpresa", {}, res => {
        if(res.RAZON_SOCIAL) {
            document.getElementById('emp-nombre').value = res.RAZON_SOCIAL;
            document.getElementById('emp-logo').value = res.LOGO_URL;
            dias.forEach(d => {
                document.getElementById(`h-${d}-INI`).value = res[d+"_INI"] || "08:00";
                document.getElementById(`h-${d}-FIN`).value = res[d+"_FIN"] || "17:00";
            });
        }
        mostrar('pantalla-config-empresa');
    });
}

function salvarConfigEmpresa() {
    const dias = ["LUN", "MAR", "MIE", "JUE", "VIE", "SAB", "DOM"];
    let config = {
        RAZON_SOCIAL: document.getElementById('emp-nombre').value,
        LOGO_URL: document.getElementById('emp-logo').value
    };
    
    dias.forEach(d => {
        config[d+"_INI"] = document.getElementById(`h-${d}-INI`).value;
        config[d+"_FIN"] = document.getElementById(`h-${d}-FIN`).value;
    });

    callServer("guardarDatosEmpresa", { config: JSON.stringify(config) }, res => {
        alert(res.msj);
        mostrar('pantalla-menu');
    });
}
</script>
</body>
</html>
