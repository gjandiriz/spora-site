<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Spora Systems V5.0 | Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* MANTENEMOS TU ESTILO ORIGINAL Y AGREGAMOS TOQUES DE SPORA */
        body { font-family: sans-serif; background: #07111f; color: #fff; padding: 15px; text-align: center; margin: 0; }
        .card { background: #1a2634; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); max-width: 500px; margin: auto; border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #333; background: #0d1721; color: white; box-sizing: border-box; }
        label { display: block; text-align: left; font-size: 11px; font-weight: bold; margin-top: 10px; color: #2fc95c; text-transform: uppercase; }
        .item-lista { display: flex; align-items: center; justify-content: space-between; background: #0d1721; border: 1px solid #333; padding: 10px; margin: 5px 0; border-radius: 8px; }
        .etiqueta-preview { background: white; color: black; border: 2px solid #000; margin: 15px auto; padding: 10px; width: 280px; text-align: center; }
        #reader { border-radius: 12px; overflow: hidden; border: 2px solid #2fc95c; background: #000; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="letter-spacing: 4px; margin-bottom: 5px;">SPORA</h1>
    <p style="color: #2fc95c; font-weight: bold; font-size: 12px; margin-top: 0; margin-bottom: 25px;">CONTROL DE TRAZABILIDAD</p>
    
    <div id="pantalla-login">
        <input type="password" id="pin-login" placeholder="PIN de Acceso" inputmode="numeric">
        <button onclick="login()" style="background:#2fc95c; color:#07111f;">ENTRAR</button>
        <div id="msj-login" style="font-size:12px; margin-top:10px; color:#f39c12;"></div>
    </div>

    <div id="pantalla-menu" class="hidden">
        <button onclick="mostrar('pantalla-proyecto')" style="background:#e67e22">🚀 NUEVO PROYECTO / LOTE</button>
        <button onclick="mostrar('pantalla-impresion')" style="background:#34495e">🏷️ CONFIGURAR ETIQUETAS</button>
        <hr style="opacity:0.1; margin: 20px 0;">
        <button onclick="mostrar('form-usuario')" style="background:#8e44ad">👤 NUEVA FICHA USUARIO</button>
        <button onclick="abrirGestor('USUARIO')" style="background:#9b59b6">👥 GESTIONAR USUARIOS</button>
        <button onclick="mostrar('form-estacion')" style="background:#2980b9">🏗️ NUEVA ESTACIÓN</button>
        <button onclick="abrirGestor('ESTACION')" style="background:#16a085">📋 GESTIONAR ESTACIONES</button>
        <button onclick="cargarFlujograma()" style="background:#f39c12">⚙️ CONFIGURAR FLUJO</button>
        <button onclick="location.reload()" style="background:#444; margin-top:20px;">SALIR</button>
    </div>

    <div id="pantalla-seleccion-puesto" class="hidden">
        <h3>Panel de Producción</h3>
        <p>Hola <strong id="nombre-op" style="color:#2fc95c;"></strong></p>
        <label>¿En qué estación vas a trabajar?</label>
        <select id="select-puesto-op"></select>
        <button onclick="entrarAPuesto()" style="background:#f39c12; color:white;">INGRESAR A ESTACIÓN</button>
        <button onclick="location.reload()" style="background:#444">SALIR</button>
    </div>

    <div id="pantalla-operario" class="hidden">
        <div style="background:#0d1721; border:1px solid #2fc95c; padding:10px; border-radius:12px; margin-bottom:15px;">
            <p style="margin:2px">Puesto: <strong id="estacion-op" style="color:#2fc95c;"></strong></p>
            <p style="margin:2px; font-size:12px; opacity:0.8">Operario: <span id="nombre-op-scan"></span></p>
        </div>

        <div id="reader"></div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px;">
            <button id="btn-iniciar-vivo" onclick="encenderCamara()" style="background:#27ae60; margin:0;">▶️ VIVO</button>
            <label for="input-archivo-camara" style="background:#3498db; color:white; border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-weight:bold; font-size:13px; height: 50px;">
                📷 FOTO
            </label>
            <input type="file" id="input-archivo-camara" accept="image/*" capture="environment" style="display:none;" onchange="escanearDesdeFoto(event)">
        </div>

        <input type="text" id="input-scan" placeholder="Código..." style="font-size:24px; text-align:center; border:2px solid #2fc95c; margin-top:15px; background: #000;">
        <button onclick="procesarScan()" style="background:#2fc95c; color:#07111f; margin-top:10px;">✅ REGISTRAR MANUAL</button>
        <div id="log-scan" style="margin-top:15px; max-height:120px; overflow-y:auto; border:1px solid #333; background:#000; padding:10px; font-size:12px; text-align:left; border-radius:8px;"></div>
        <button onclick="location.reload()" style="background:#444; margin-top:20px;">SALIR</button>
    </div>

    </div>

<script>
    // ESTA ES LA URL DE TU GOOGLE SCRIPT (API)
    const API_URL = "https://script.google.com/macros/s/AKfycbzbNN-xJFtiD3rhXc0fNlVPk2slg6JPW9RhNd8VyLHxlPOaUvuc2TNwiluJX2waT_s4/exec";
    
    let usuarioActual = "";
    let estacionActual = "";
    let html5QrCode = null;

    // --- PUENTE DE DATOS (REEMPLAZA A google.script.run) ---
    async function llamarGoogle(accion, params = {}) {
        let url = `${API_URL}?action=${accion}`;
        for (let key in params) {
            url += `&${key}=${encodeURIComponent(params[key])}`;
        }
        try {
            const response = await fetch(url);
            return await response.json();
        } catch (e) {
            console.error("Error en comunicación:", e);
            return { status: "ERROR", mensaje: "Error de conexión con Spora Cloud" };
        }
    }

    function login() {
        const pin = document.getElementById('pin-login').value;
        if(!pin) return alert("Ingresá un PIN");
        
        document.getElementById('msj-login').innerText = "Verificando...";
        
        llamarGoogle("login", { pin: pin }).then(res => {
            if (res.status === "OK") {
                usuarioActual = res.usuario.nombre;
                if (res.usuario.rol === "GERENTE") {
                    mostrar('pantalla-menu');
                } else {
                    document.getElementById('nombre-op').innerText = usuarioActual;
                    const sel = document.getElementById('select-puesto-op');
                    sel.innerHTML = '<option value="">-- Seleccionar Estación --</option>';
                    res.puestosDisponibles.forEach(p => { sel.innerHTML += `<option value="${p}">${p}</option>`; });
                    mostrar('pantalla-seleccion-puesto');
                }
            } else {
                document.getElementById('msj-login').innerText = res.mensaje;
            }
        });
    }

    function mostrar(id) {
        const pantallas = ['pantalla-login','pantalla-menu','pantalla-seleccion-puesto','pantalla-operario','pantalla-impresion','pantalla-proyecto','form-usuario'];
        pantallas.forEach(p => { if(document.getElementById(p)) document.getElementById(p).classList.add('hidden'); });
        document.getElementById(id).classList.remove('hidden');
    }

    function entrarAPuesto() {
        const puesto = document.getElementById('select-puesto-op').value;
        if (!puesto) return alert("Seleccioná un puesto");
        estacionActual = puesto;
        document.getElementById('estacion-op').innerText = puesto;
        document.getElementById('nombre-op-scan').innerText = usuarioActual;
        mostrar('pantalla-operario');
    }

    // --- CAMARA (PARCHE IPHONE) ---
    async function encenderCamara() {
        if(!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 20, qrbox: { width: 250, height: 150 } };
        
        html5QrCode.start({ facingMode: "environment" }, config,
            (text) => {
                document.getElementById('input-scan').value = text;
                if (navigator.vibrate) navigator.vibrate(100);
                procesarScan();
            },
            () => {} 
        ).catch(err => alert("Revisá los permisos de cámara en Safari."));
    }

    function procesarScan() {
        const idPieza = document.getElementById('input-scan').value;
        if(!idPieza || idPieza.includes("⌛")) return;
        
        llamarGoogle("registrar", { id: idPieza, estacion: estacionActual, usuario: usuarioActual }).then(res => {
            const log = document.getElementById('log-scan');
            const hora = new Date().toLocaleTimeString();
            if(res.status === "OK") {
                log.innerHTML = `<p style="color:#2fc95c"><b>${hora}</b> - ${res.msj}</p>` + log.innerHTML;
                document.getElementById('input-scan').value = "";
            } else alert(res.msj);
        });
    }

    // --- EL RESTO DE TUS FUNCIONES (IMPORTAR, ETIQUETAS) SE ADAPTAN IGUAL ---
    // Gonzalo: Para cada función de tu Excel, usaremos el mismo formato de 'llamarGoogle'
</script>
</body>
</html>
