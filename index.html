<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Spora Systems V5.5</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #07111f; color: white; margin: 0; padding: 15px; text-align: center; }
        .card { background: #111d2b; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 500px; margin: auto; border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }
        button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; background: #2c3e50; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #2c3e50; background: #07111f; color: white; font-size: 16px; box-sizing: border-box; }
        .item-lista { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 12px; margin: 5px 0; border-radius: 8px; border-left: 4px solid #2fc95c; text-align: left; }
        .etiqueta-preview { background: white; color: black; border: 2px solid #000; margin: 15px auto; padding: 10px; width: 280px; text-align: center; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid #3498db; background: #000; margin: 15px 0; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1 style="letter-spacing: 5px; margin-bottom: 0;">SPORA</h1>
    <p style="color: #2fc95c; font-weight: bold; font-size: 11px; margin-top: 5px; margin-bottom: 30px;">SYSTEMS V5.5</p>

    <div id="pantalla-login">
        <input type="password" id="pin-login" placeholder="PIN de Acceso" inputmode="numeric">
        <button onclick="login()" style="background:#2fc95c; color:#07111f;">ENTRAR</button>
    </div>

    <div id="pantalla-menu" class="hidden">
        <button onclick="abrirPantallaProyecto()" style="background:#e67e22">🚀 NUEVO PROYECTO / LOTE</button>
        <button onclick="mostrar('pantalla-menu-etiquetas')" style="background:#34495e">🏷️ ETIQUETAS</button>
        <button onclick="abrirConfigEmpresa()" style="background:#16a085">⚙️ CONFIGURACIÓN DE PLANTA</button>
        <button onclick="cargarFlujograma()" style="background:#f39c12">⚙️ GESTIONAR ESTACIONES</button>
        <button onclick="abrirGestorUsuarios()" style="background:#9b59b6">👥 GESTIONAR USUARIOS</button>
        <button onclick="location.reload()" style="background:#444; margin-top:20px;">SALIR</button>
    </div>

    <div id="pantalla-proyecto" class="hidden">
        <h3>🚀 Nuevo Proyecto</h3>
        <input type="text" id="id-proyecto-nuevo" placeholder="Nombre del Proyecto">
        <input type="file" id="archivo-excel" accept=".xlsx, .xls">
        <div id="mapeador-columnas" class="hidden">
            <div id="selector-mapeo"></div>
        </div>
        <button onclick="procesarYSubir()" style="background:#27ae60;">SUBIR E IMPORTAR</button>
        <button onclick="mostrar('pantalla-menu')" style="background:#444">VOLVER</button>
    </div>

    <div id="pantalla-menu-etiquetas" class="hidden">
        <button onclick="abrirDisenoEtiquetas()" style="background:#34495e">🏷️ DISEÑO DE ETIQUETAS</button>
        <button onclick="abrirImpresionLote()" style="background:#27ae60">🖨️ IMPRESIÓN POR LOTE</button>
        <button onclick="abrirBuscadorReimpresion()" style="background:#3498db">🔍 BUSCADOR / REIMPRESIÓN</button>
        <button onclick="mostrar('pantalla-menu')" style="background:#444">VOLVER</button>
    </div>

    <div id="pantalla-impresion" class="hidden">
        <h3>Diseño</h3>
        <select id="id-proy-print"></select>
        <button onclick="cargarConfigurador()" style="background:#3498db">CARGAR</button>
        <div id="config-campos-etiqueta"></div>
        <div id="etiqueta-preview-live" class="etiqueta-preview"></div>
        <button onclick="guardarDisenoMaestro()" style="background:#8e44ad;">💾 GUARDAR</button>
        <button onclick="mostrar('pantalla-menu-etiquetas')" style="background:#444">VOLVER</button>
    </div>

    <div id="pantalla-gestor" class="hidden">
        <h3>Usuarios</h3>
        <div id="lista-gestor"></div>
        <button onclick="mostrar('pantalla-menu')" style="background:#444">VOLVER</button>
    </div>

    <div id="pantalla-config-empresa" class="hidden">
        <h3>Configuración</h3>
        <input type="text" id="emp-nombre" placeholder="Nombre">
        <input type="text" id="emp-cuit" placeholder="CUIT">
        <input type="text" id="emp-direccion" placeholder="Dirección">
        <input type="text" id="emp-logo" placeholder="URL Logo">
        <div id="contenedor-horarios"></div>
        <button onclick="salvarConfigEmpresa()" style="background:#2fc95c;">GUARDAR</button>
        <button onclick="mostrar('pantalla-menu')" style="background:#444">VOLVER</button>
    </div>

    <div id="pantalla-flujo" class="hidden">
        <h3>Estaciones</h3>
        <div id="lista-flujo-estaciones"></div>
        <button onclick="salvarFlujo()" style="background:#2fc95c;">GUARDAR</button>
        <button onclick="mostrar('pantalla-menu')" style="background:#444">VOLVER</button>
    </div>

    <div id="pantalla-reimpresion" class="hidden">
        <input type="text" id="input-busqueda-universal" placeholder="Buscar pieza u OC...">
        <button onclick="ejecutarBusquedaUniversal()" style="background:#2fc95c;">BUSCAR</button>
        <div id="lista-resultados-busqueda"></div>
        <button onclick="mostrar('pantalla-menu-etiquetas')" style="background:#444">VOLVER</button>
    </div>
</div>

<div id="modal-reimpresion" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column;">
    <div id="area-ticket-reimpresion"></div>
    <div style="margin-top:20px; display:flex; gap:10px;">
        <button onclick="lanzarImpresionUnica()" style="background:#2fc95c; width:150px;">Imprimir</button>
        <button onclick="document.getElementById('modal-reimpresion').classList.add('hidden')" style="background:#e74c3c; width:150px;">Cerrar</button>
    </div>
</div>

<script src="js/main.js"></script>
<script src="js/escaneo.js"></script>
<script src="js/importacion.js"></script>
<script src="js/etiquetas.js"></script>
<script src="js/buscador.js"></script>
<script src="js/usuarios.js"></script>
<script src="js/flujo.js"></script>
<script src="js/empresa.js"></script>
</body>
</html>
